# Serenity
serenity.project.name = thinking-UI
#serenity.take.screenshots = FOR_FAILURES
serenity.take.screenshots = FOR_EACH_ACTION
serenity.browser.maximized = true
serenity.verbose.steps=true
serenity.logging=VERBOSE

# Browserstack
browserstack.user = ${BROWSERSTACK_USER}
browserstack.key = ${BROWSERSTACK_KEY}

# Driver
headless.mode = false

# Reportes
serenity.report.show.step.details=true
serenity.report.show.pie.charts=true
serenity.report.show.state.statistics=true

# Screenshots en reportes
serenity.compress.screenshots=true

# Historial
serenity.report.encoding=UTF-8